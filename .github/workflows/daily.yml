name: Global Intelligence System

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests openai

      - name: Fetch News
        run: python src/fetch_news.py

      - name: Analyze Trends
        run: python src/analyze_trend.py

      - name: Generate Report
        run: python src/generate_report.py

      - name: Commit results
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add output/
          git commit -m "auto daily report" || exit 0
          git push
