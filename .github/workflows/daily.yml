name: Daily Intelligence Update

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install feedparser

      - name: Fetch news
        run: python src/fetch_news.py

      - name: Analyze trends
        run: python src/analyze_trend.py

      - name: Generate dashboard
        run: python src/generate_report.py

      - name: Commit results
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"

          git add data/*.json output/*.json

          git commit -m "auto daily report" || echo "no changes"

          git push
