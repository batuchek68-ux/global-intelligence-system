name: Global Intelligence v4

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch
        run: python src/fetch_news.py

      - name: Preprocess
        run: python src/preprocess.py

      - name: AI Summary
        run: python src/ai_summary.py

      - name: Trend Analysis
        run: python src/trend_analyzer.py

      - name: Commit results
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/
          git commit -m "update intelligence" || echo "no changes"
          git push
