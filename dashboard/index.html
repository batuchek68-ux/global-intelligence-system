<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Global Intelligence System</title>
</head>
<body>

<h1>Global Intelligence Dashboard</h1>

<div id="updated"></div>

<h2>Top Trends</h2>

<ul id="trend"></ul>

<h2>News</h2>

<ul id="news"></ul>

<script>

fetch("../output/dashboard.json")
.then(r=>r.json())
.then(data=>{

document.getElementById("updated").innerHTML=
data.updated_at

let trend=""

data.top_keywords.forEach(item=>{
trend+=`<li>${item[0]} (${item[1]})</li>`
})

document.getElementById("trend").innerHTML=trend

let news=""

data.top_news.forEach(item=>{
news+=`<li>${item.title}</li>`
})

document.getElementById("news").innerHTML=news

})

</script>

</body>
</html>
